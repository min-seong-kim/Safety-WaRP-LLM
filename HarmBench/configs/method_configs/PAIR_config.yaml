# ==== Llama3 3B models ======
# llama3_2_3b-base  : 모든 base 계열 모델의 공통 config (fallback prefix 매칭 적용)
#                     → llama3_2_3b-base-SSFT, llama3_2_3b-base-WaRP-*, 등 자동 커버
# llama3_2_3b-instruct : 모든 instruct 계열 모델의 공통 config
#                     → llama3_2_3b-instruct-*, 등 자동 커버
# 새 모델 추가 시 별도 항목 불필요. models.yaml에만 추가하면 됨.
